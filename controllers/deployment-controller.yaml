apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubia
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubia
  template:
    metadata:
      labels:
        app: kubia
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: kubia
        image: anhhieu623/ubuntu-nginx-ssl:lastest
        ports:
        - containerPort: 8080
        readinessProbe:
          exec: 
            command: 
            - ls
            - /var/ready